<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUR/USD Дашборд — NovaFX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0e14;--bg2:#111520;--bg3:#171d2b;
  --border:#222c40;--border2:#2a3550;
  --text:#e8edf5;--text2:#8a97b0;--text3:#4a5568;
  --green:#00e676;--green-bg:rgba(0,230,118,.08);--green-br:rgba(0,230,118,.2);
  --red:#ff4757;--red-bg:rgba(255,71,87,.08);
  --amber:#ffb300;--amber-bg:rgba(255,179,0,.08);
  --r:10px;--rs:6px;
  --ff:'Syne',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
[data-theme="light"] {
  --bg:#f0f4fa;--bg2:#fff;--bg3:#e4eaf5;
  --border:#c4cedf;--border2:#b0bed4;
  --text:#0d1117;--text2:#2d3a4f;--text3:#5a6a80;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;transition:background .2s,color .2s}

/* NAV */
nav{display:flex;align-items:center;gap:6px;padding:0 20px;height:52px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.nav-logo{font-family:var(--ff);font-weight:800;font-size:17px;color:var(--green);letter-spacing:-.5px;text-decoration:none;margin-right:8px}
.nav-badge{background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);font-size:11px;padding:3px 9px;border-radius:var(--rs);font-family:var(--fb)}
.nav-links{display:flex;align-items:center;gap:2px;margin-left:auto}
.nav-a{padding:5px 11px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;transition:all .15s}
.nav-a:hover{color:var(--text);background:var(--bg3)}
.nav-cta{background:var(--green-bg);color:var(--green)!important;border:0.5px solid var(--green-br)}
.nav-cta:hover{opacity:.85}
.theme-btn{background:none;border:0.5px solid var(--border);border-radius:var(--rs);width:32px;height:32px;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;margin-left:6px;transition:all .15s}
.theme-btn:hover{background:var(--bg3);color:var(--text)}
.burger{display:none;background:none;border:0.5px solid var(--border);border-radius:var(--rs);width:32px;height:32px;cursor:pointer;color:var(--text);font-size:18px;align-items:center;justify-content:center;margin-left:6px}
.dd{display:none;position:absolute;top:52px;right:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:8px;min-width:180px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.dd.open{display:block}
.dd a{display:block;padding:8px 12px;font-size:13px;color:var(--text2);text-decoration:none;border-radius:var(--rs)}
.dd a:hover{background:var(--bg3);color:var(--text)}
.dd hr{border:none;border-top:0.5px solid var(--border);margin:4px 0}
.dd-tg{color:var(--green)!important}
@media(max-width:700px){
  .nav-links{display:none}
  .burger{display:flex}
}

/* LAYOUT */
.wrap{max-width:960px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
@media(max-width:600px){
  .wrap{grid-template-columns:1fr;padding:10px;gap:10px}
  .full{grid-column:1}
}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px}
.clabel{font-size:9px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.auto-tag{background:var(--green-bg);color:var(--green);font-size:9px;padding:2px 6px;border-radius:4px;border:0.5px solid var(--green-br)}

/* PRICE */
.price-num{font-family:var(--fm);font-size:44px;font-weight:600;letter-spacing:-2px;line-height:1}
.price-chg{font-size:12px;margin-left:8px;font-family:var(--fm)}
.price-meta{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:11px;color:var(--text2)}
.price-meta b{color:var(--text);font-weight:500}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}

/* VOLATILITY */
.vol-val{font-family:var(--fm);font-size:24px;font-weight:600}
.vol-bar{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--green) 0%,var(--amber) 50%,var(--red) 100%);margin-top:8px;position:relative}
.vol-marker{position:absolute;top:-4px;width:3px;height:13px;background:var(--text);border-radius:2px;transition:left .5s}

/* SENTIMENT */
.sent-row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px}
.sent-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px}
.sent-bull{background:var(--green);border-radius:5px 0 0 5px;transition:width .5s}
.sent-bear{background:var(--red);border-radius:0 5px 5px 0;transition:width .5s}
.sent-note{font-size:10px;color:var(--text2);margin-top:6px}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">NovaFX</a>
  <span class="nav-badge">Дашборд</span>

  <div class="nav-links">
    <a href="/#about" class="nav-a">О продукте</a>
    <a href="/#contacts" class="nav-a">Контакты</a>
    <a href="https://t.me/DigitalNovaLabs" target="_blank" class="nav-a">Техподдержка</a>
    <a href="https://t.me/DigitalNovaLabs" target="_blank" class="nav-a nav-cta">Telegram</a>
  </div>

  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="Сменить тему">🌙</button>

  <button class="burger" onclick="toggleMenu()" aria-label="Меню">☰</button>
  <div class="dd" id="dd">
    <a href="/#about" onclick="closeMenu()">О продукте</a>
    <a href="/#contacts" onclick="closeMenu()">Контакты</a>
    <a href="https://t.me/DigitalNovaLabs" target="_blank" onclick="closeMenu()">Техподдержка</a>
    <hr>
    <a href="https://t.me/DigitalNovaLabs" target="_blank" class="dd-tg" onclick="closeMenu()">✈️ Telegram</a>
  </div>
</nav>

<div class="wrap">

  <!-- PRICE -->
  <div class="card full">
    <div class="clabel">EUR/USD · цена <span class="auto-tag">● ECB · каждые 30 сек</span></div>
    <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:4px">
      <span class="price-num" id="price">—</span>
      <span class="price-chg" id="price-chg"></span>
    </div>
    <div class="price-meta">
      <span>Open: <b id="p-open">—</b></span>
      <span>High: <b class="green" id="p-high">—</b></span>
      <span>Low: <b class="red" id="p-low">—</b></span>
      <span>Диапазон 30д: <b id="p-range">—</b></span>
      <span style="margin-left:auto;color:var(--green)" id="p-time">загрузка...</span>
    </div>
  </div>

  <!-- VOLATILITY -->
  <div class="card full">
    <div class="clabel">Волатильность <span class="auto-tag">● авто</span></div>
    <div class="vol-val amber" id="vol-val">— пп</div>
    <div style="font-size:10px;color:var(--text2);margin-top:3px" id="vol-label">вычисляется...</div>
    <div class="vol-bar"><div class="vol-marker" id="vol-marker" style="left:50%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:4px">
      <span>Низкая</span><span>Средняя</span><span>Высокая</span>
    </div>
  </div>

    <!-- NEWS TradingView -->
  <div class="card full" style="padding:0;overflow:hidden;min-height:500px">
    <div class="clabel" style="padding:14px 14px 0">Новости EUR/USD <span class="auto-tag">● TradingView · авто</span></div>
    <div class="tradingview-widget-container" style="height:460px">
      <div class="tradingview-widget-container__widget" style="height:100%"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
        "feedMode": "symbol",
        "symbol": "FX:EURUSD",
        "isTransparent": true,
        "displayMode": "regular",
        "width": "100%",
        "height": "460",
        "colorTheme": "dark",
        "locale": "en"
      }
      </script>
    </div>
  </div>

</div>

<script>
function toggleTheme() {
  var html = document.documentElement;
  var btn = document.getElementById('theme-btn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '🌙';
    localStorage.setItem('theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
    localStorage.setItem('theme', 'dark');
  }
}
function toggleMenu() {
  document.getElementById('dd').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('dd').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.burger') && !e.target.closest('.dd')) closeMenu();
});
var saved = localStorage.getItem('theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
}

// PRICE
var prevRate = null;
function fetchPrice() {
  fetch('https://api.frankfurter.dev/v1/latest?base=EUR&symbols=USD')
    .then(function(r){ return r.json(); })
    .then(function(d) {
      var rate = d.rates.USD;
      document.getElementById('price').textContent = rate.toFixed(4);
      if (prevRate !== null) {
        var diff = rate - prevRate;
        var pct = (diff / prevRate * 100);
        var el = document.getElementById('price-chg');
        if (diff >= 0) {
          el.textContent = '▲ +' + diff.toFixed(4) + ' (+' + Math.abs(pct).toFixed(2) + '%)';
          el.style.color = 'var(--green)';
        } else {
          el.textContent = '▼ ' + diff.toFixed(4) + ' (' + pct.toFixed(2) + '%)';
          el.style.color = 'var(--red)';
        }
      } else {
        var el = document.getElementById('price-chg');
        el.textContent = '● live ECB';
        el.style.color = 'var(--green)';
      }
      prevRate = rate;
      var now = new Date();
      document.getElementById('p-time').textContent =
        'обновлено ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }).catch(function(){
      document.getElementById('p-time').textContent = 'ошибка';
    });
}

// HISTORY
function fetchHistory() {
  var today = new Date();
  var fmt = function(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
  var d30 = new Date(today); d30.setDate(d30.getDate()-30);
  fetch('https://api.frankfurter.dev/v1/'+fmt(d30)+'..'+fmt(today)+'?base=EUR&symbols=USD')
    .then(function(r){ return r.json(); })
    .then(function(d) {
      var rates = Object.values(d.rates).map(function(x){ return x.USD; });
      var high = Math.max.apply(null, rates);
      var low = Math.min.apply(null, rates);
      var range = Math.round((high - low) * 10000);
      document.getElementById('p-open').textContent = rates[0].toFixed(4);
      document.getElementById('p-high').textContent = high.toFixed(4);
      document.getElementById('p-low').textContent = low.toFixed(4);
      document.getElementById('p-range').textContent = range + ' пп';
      document.getElementById('vol-val').textContent = range + ' пп';
      var level, color, pct;
      if (range < 150) { level='Низкая'; color='var(--green)'; pct=15; }
      else if (range < 300) { level='Умеренная'; color='var(--amber)'; pct=45; }
      else if (range < 500) { level='Высокая'; color='var(--red)'; pct=75; }
      else { level='Очень высокая'; color='var(--red)'; pct=92; }
      document.getElementById('vol-label').textContent = level + ' · 30д диапазон';
      document.getElementById('vol-val').style.color = color;
      document.getElementById('vol-marker').style.left = pct + '%';
    }).catch(function(){});
}

fetchPrice();
fetchHistory();
setInterval(fetchPrice, 30000);
setInterval(fetchHistory, 3600000);
</script>
</body>
</html>
